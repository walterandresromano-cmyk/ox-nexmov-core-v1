<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010712"/>
      <stop offset="52%" stop-color="#061424"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
    <linearGradient id="g-road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#1a2f47"/>
    </linearGradient>
    <radialGradient id="g-horizon" cx="50%" cy="43.5%" r="44%" gradientUnits="objectBoundingBox">
      <stop offset="0%"  stop-color="#38bdf8" stop-opacity="0.80"/>
      <stop offset="22%" stop-color="#0ea5e9" stop-opacity="0.40"/>
      <stop offset="52%" stop-color="#0369a1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000"   stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g-road-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#38bdf8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g-horizon-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="22%"  stop-color="#7dd3fc" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.95"/>
      <stop offset="78%"  stop-color="#7dd3fc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="g-hl-l" cx="40%" cy="72%" r="26%">
      <stop offset="0%"   stop-color="#e0f2fe" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-hl-r" cx="60%" cy="72%" r="26%">
      <stop offset="0%"   stop-color="#e0f2fe" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#g-sky)"/>

  <!-- Horizon atmospheric glow -->
  <rect width="1600" height="900" fill="url(#g-horizon)"/>

  <!-- Road surface (perspective trapezoid) -->
  <polygon points="0,900 1600,900 1060,392 540,392" fill="url(#g-road)"/>

  <!-- Road glow overlay -->
  <polygon points="540,392 1060,392 1310,680 290,680" fill="url(#g-road-glow)"/>

  <!-- Headlight pools on asphalt -->
  <ellipse cx="590"  cy="680" rx="210" ry="72" fill="url(#g-hl-l)"/>
  <ellipse cx="1010" cy="680" rx="210" ry="72" fill="url(#g-hl-r)"/>

  <!-- Horizon glow line -->
  <rect x="0" y="391"   width="1600" height="2.5" fill="url(#g-horizon-line)" rx="1"/>
  <rect x="0" y="393"   width="1600" height="8"   fill="url(#g-horizon-line)" opacity="0.28" rx="3"/>

  <!-- Road edge lines (perspective) -->
  <line x1="540"  y1="392" x2="0"    y2="900" stroke="#4a90b8" stroke-width="2.5" stroke-opacity="0.22"/>
  <line x1="1060" y1="392" x2="1600" y2="900" stroke="#4a90b8" stroke-width="2.5" stroke-opacity="0.22"/>

  <!-- Center lane markings — perspective-scaled dashes -->
  <rect x="795" y="396"  width="10"  height="7"  fill="#38bdf8" fill-opacity="0.32" rx="1"/>
  <rect x="793" y="409"  width="13"  height="8"  fill="#38bdf8" fill-opacity="0.29" rx="1"/>
  <rect x="791" y="424"  width="17"  height="10" fill="#38bdf8" fill-opacity="0.26" rx="1"/>
  <rect x="788" y="442"  width="22"  height="13" fill="#38bdf8" fill-opacity="0.23" rx="1"/>
  <rect x="785" y="464"  width="29"  height="16" fill="#38bdf8" fill-opacity="0.20" rx="1"/>
  <rect x="780" y="491"  width="38"  height="20" fill="#38bdf8" fill-opacity="0.17" rx="1"/>
  <rect x="773" y="524"  width="52"  height="25" fill="#38bdf8" fill-opacity="0.13" rx="1"/>
  <rect x="764" y="565"  width="68"  height="31" fill="#38bdf8" fill-opacity="0.10" rx="1"/>
  <rect x="751" y="616"  width="90"  height="39" fill="#38bdf8" fill-opacity="0.08" rx="1"/>
  <rect x="734" y="678"  width="120" height="48" fill="#38bdf8" fill-opacity="0.06" rx="1"/>
  <rect x="712" y="752"  width="158" height="58" fill="#38bdf8" fill-opacity="0.04" rx="1"/>
  <rect x="686" y="838"  width="206" height="70" fill="#38bdf8" fill-opacity="0.03" rx="1"/>

  <!-- Distant city / horizon lights -->
  <circle cx="735" cy="382" r="2.5" fill="#bae6fd" fill-opacity="0.78"/>
  <circle cx="758" cy="379" r="1.8" fill="#7dd3fc" fill-opacity="0.70"/>
  <circle cx="714" cy="384" r="2.0" fill="#bae6fd" fill-opacity="0.65"/>
  <circle cx="843" cy="381" r="2.2" fill="#7dd3fc" fill-opacity="0.72"/>
  <circle cx="820" cy="377" r="1.5" fill="#e0f2fe" fill-opacity="0.60"/>
  <circle cx="676" cy="386" r="1.8" fill="#7dd3fc" fill-opacity="0.55"/>
  <circle cx="876" cy="384" r="1.5" fill="#bae6fd" fill-opacity="0.50"/>
  <circle cx="644" cy="388" r="1.2" fill="#93c5fd" fill-opacity="0.42"/>
  <circle cx="908" cy="387" r="1.2" fill="#93c5fd" fill-opacity="0.40"/>
  <circle cx="612" cy="391" r="1.0" fill="#7dd3fc" fill-opacity="0.32"/>
  <circle cx="942" cy="390" r="1.0" fill="#7dd3fc" fill-opacity="0.30"/>

  <!-- Oncoming headlights on horizon -->
  <circle cx="778" cy="392" r="2.0" fill="#fff"    fill-opacity="0.75"/>
  <circle cx="822" cy="392" r="2.0" fill="#fff"    fill-opacity="0.75"/>
  <circle cx="778" cy="392" r="5.5" fill="#38bdf8" fill-opacity="0.18"/>
  <circle cx="822" cy="392" r="5.5" fill="#38bdf8" fill-opacity="0.18"/>

  <!-- Stars (upper sky) -->
  <circle cx="180"  cy="75"  r="1.1" fill="#e2e8f0" fill-opacity="0.42"/>
  <circle cx="390"  cy="138" r="0.8" fill="#e2e8f0" fill-opacity="0.36"/>
  <circle cx="105"  cy="198" r="1.3" fill="#bae6fd" fill-opacity="0.30"/>
  <circle cx="510"  cy="58"  r="0.9" fill="#e2e8f0" fill-opacity="0.40"/>
  <circle cx="1090" cy="88"  r="1.1" fill="#e2e8f0" fill-opacity="0.36"/>
  <circle cx="1295" cy="148" r="0.8" fill="#bae6fd" fill-opacity="0.30"/>
  <circle cx="1462" cy="68"  r="1.0" fill="#e2e8f0" fill-opacity="0.40"/>
  <circle cx="1360" cy="205" r="0.9" fill="#e2e8f0" fill-opacity="0.35"/>
  <circle cx="955"  cy="108" r="0.8" fill="#e2e8f0" fill-opacity="0.30"/>
  <circle cx="1510" cy="295" r="1.0" fill="#bae6fd" fill-opacity="0.25"/>
  <circle cx="48"   cy="318" r="0.9" fill="#e2e8f0" fill-opacity="0.30"/>
  <circle cx="245"  cy="48"  r="0.7" fill="#e2e8f0" fill-opacity="0.36"/>
  <circle cx="760"  cy="98"  r="0.8" fill="#bae6fd" fill-opacity="0.28"/>
  <circle cx="660"  cy="162" r="0.7" fill="#e2e8f0" fill-opacity="0.26"/>
  <circle cx="1170" cy="220" r="0.9" fill="#e2e8f0" fill-opacity="0.28"/>
</svg>
