<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" role="img" aria-label="Red circular de interconexión NEXMOV">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="360" y2="260">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="52%" stop-color="#061120"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>

    <radialGradient id="ambient" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="48%" stop-color="#0ea5e9" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#020817" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringStroke" x1="92" y1="42" x2="268" y2="218">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.72"/>
      <stop offset="38%" stop-color="#38bdf8" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.44"/>
    </linearGradient>

    <linearGradient id="lineStroke" x1="98" y1="48" x2="262" y2="212">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.14"/>
    </linearGradient>

    <linearGradient id="activeLine" x1="122" y1="72" x2="238" y2="188">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.42"/>
      <stop offset="44%" stop-color="#38bdf8" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.22"/>
    </linearGradient>

    <radialGradient id="nodeFill" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="38%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>

    <radialGradient id="hubFill" cx="34%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="34%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </radialGradient>

    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#38bdf8" flood-opacity="0.68"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#0ea5e9" flood-opacity="0.26"/>
    </filter>

    <filter id="hubGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.2" flood-color="#38bdf8" flood-opacity="0.88"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#0ea5e9" flood-opacity="0.34"/>
    </filter>

    <filter id="softLineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.1" flood-color="#38bdf8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="360" height="260" rx="28" fill="url(#bg)"/>
  <rect width="360" height="260" rx="28" fill="url(#ambient)"/>

  <rect
    x="1"
    y="1"
    width="358"
    height="258"
    rx="27"
    fill="none"
    stroke="#38bdf8"
    stroke-opacity="0.10"
  />

  <!-- halo exterior -->
  <circle
    cx="180"
    cy="130"
    r="96"
    fill="none"
    stroke="#38bdf8"
    stroke-width="1"
    stroke-opacity="0.035"
  />

  <!-- círculo principal perfecto -->
  <circle
    cx="180"
    cy="130"
    r="82"
    fill="none"
    stroke="url(#ringStroke)"
    stroke-width="1.55"
    opacity="0.95"
    filter="url(#softLineGlow)"
  />

  <!-- círculo interno -->
  <circle
    cx="180"
    cy="130"
    r="58"
    fill="none"
    stroke="#38bdf8"
    stroke-width="1"
    stroke-opacity="0.09"
  />

  <!-- círculo técnico menor -->
  <circle
    cx="180"
    cy="130"
    r="34"
    fill="none"
    stroke="#38bdf8"
    stroke-width="1"
    stroke-opacity="0.055"
  />

  <!-- conexiones -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- radiales -->
    <path d="M180 48 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M238 72 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M262 130 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M238 188 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M180 212 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M122 188 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M98 130 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>
    <path d="M122 72 L180 130" stroke="url(#lineStroke)" stroke-width="1.15"/>

    <!-- perímetro entre nodos -->
    <path
      d="M180 48 L238 72 L262 130 L238 188 L180 212 L122 188 L98 130 L122 72 Z"
      stroke="#38bdf8"
      stroke-opacity="0.22"
      stroke-width="1.1"
    />

    <!-- geometría interna premium -->
    <path
      d="M180 48 L262 130 L180 212 L98 130 Z"
      stroke="#7dd3fc"
      stroke-opacity="0.12"
      stroke-width="1"
    />

    <path
      d="M122 72 L238 188"
      stroke="#38bdf8"
      stroke-opacity="0.11"
      stroke-width="1"
    />

    <path
      d="M238 72 L122 188"
      stroke="#38bdf8"
      stroke-opacity="0.11"
      stroke-width="1"
    />

    <!-- eje activo -->
    <path
      d="M122 72 L180 130 L238 188"
      stroke="url(#activeLine)"
      stroke-width="1.45"
      stroke-opacity="0.75"
    />

    <path
      d="M238 72 L180 130 L122 188"
      stroke="url(#activeLine)"
      stroke-width="1.25"
      stroke-opacity="0.44"
    />
  </g>

  <!-- pulso central -->
  <circle cx="180" cy="130" r="22" fill="none" stroke="#38bdf8" stroke-opacity="0.15"/>
  <circle cx="180" cy="130" r="40" fill="none" stroke="#38bdf8" stroke-opacity="0.06"/>

  <!-- nodos perfectamente distribuidos -->
  <g fill="url(#nodeFill)" filter="url(#nodeGlow)">
    <circle cx="180" cy="48" r="5"/>
    <circle cx="238" cy="72" r="5"/>
    <circle cx="262" cy="130" r="5"/>
    <circle cx="238" cy="188" r="5"/>
    <circle cx="180" cy="212" r="5"/>
    <circle cx="122" cy="188" r="5"/>
    <circle cx="98" cy="130" r="5"/>
    <circle cx="122" cy="72" r="5"/>
  </g>

  <!-- anillos de nodos -->
  <g fill="none" stroke="#38bdf8" stroke-opacity="0.16">
    <circle cx="180" cy="48" r="9"/>
    <circle cx="262" cy="130" r="9"/>
    <circle cx="180" cy="212" r="9"/>
    <circle cx="98" cy="130" r="9"/>
  </g>

  <!-- nodo central -->
  <g filter="url(#hubGlow)">
    <circle cx="180" cy="130" r="8" fill="url(#hubFill)"/>
  </g>

  <!-- núcleo interno del hub -->
  <circle cx="180" cy="130" r="3.2" fill="#f0f9ff" opacity="0.85"/>

  <!-- puntos secundarios equidistantes sobre el círculo -->
  <g fill="#38bdf8" opacity="0.22">
    <circle cx="211.4" cy="54.2" r="1.7"/>
    <circle cx="255.8" cy="98.6" r="1.7"/>
    <circle cx="255.8" cy="161.4" r="1.7"/>
    <circle cx="211.4" cy="205.8" r="1.7"/>
    <circle cx="148.6" cy="205.8" r="1.7"/>
    <circle cx="104.2" cy="161.4" r="1.7"/>
    <circle cx="104.2" cy="98.6" r="1.7"/>
    <circle cx="148.6" cy="54.2" r="1.7"/>
  </g>
</svg>