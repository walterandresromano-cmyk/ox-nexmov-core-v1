name: Notificar dealers fundadores

on:
  push:
    branches:
      - master

jobs:
  notify:
    name: Enviar actualización al grupo fundador
    runs-on: ubuntu-latest

    steps:
      - name: Llamar endpoint de notificación (con retry)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          NOTIFY_SECRET: ${{ secrets.FOUNDERS_NOTIFY_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "⚠️  Secret APP_URL no configurado — saltando notificación."
            exit 0
          fi

          PAYLOAD="{\"message\": \"Nuevas mejoras publicadas en la plataforma.\", \"version\": \"${COMMIT_SHA}\"}"

          for i in 1 2 3 4; do
            WAIT=$((i * 30))
            echo "Intento $i — esperando ${WAIT}s para que Vercel complete el deploy..."
            sleep $WAIT

            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              -X POST "${APP_URL}/api/notify-founders" \
              -H "x-notify-secret: ${NOTIFY_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            echo "HTTP status: $RESPONSE"
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Dealers fundadores notificados en el intento $i."
              exit 0
            fi
            echo "El endpoint respondió $RESPONSE. Reintentando..."
          done

          echo "⚠️  No se pudo notificar después de 4 intentos. Verificar logs de Vercel."
          exit 1
