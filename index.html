<!doctype html>
<html lang="es">

<head>
  <!-- FOUC prevention: setear data-theme antes de cualquier CSS -->
  <script>
    (function(){
      var k="ox-nexmov-theme";
      var stored=localStorage.getItem(k);
      if(stored==="light"||stored==="dark"){
        document.documentElement.dataset.theme=stored;
      } else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches){
        document.documentElement.dataset.theme="light";
      } else {
        document.documentElement.dataset.theme="dark";
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=10" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / iOS standalone -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="canonical" href="https://www.oxnexmov.com.ar/" />

  <!-- Theme color for browser UI -->
  <meta name="theme-color" content="#050913" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f0f4f8" media="(prefers-color-scheme: light)" />

  <!-- schema.org: WebSite + Organization (estático, todas las páginas) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "oX NEXMOV",
    "url": "https://www.oxnexmov.com.ar",
    "inLanguage": "es-AR",
    "description": "Marketplace de vehículos usados verificados en Argentina.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://www.oxnexmov.com.ar/?buscar={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <script type="application/ld+json">

    "@context": "https://schema.org",
